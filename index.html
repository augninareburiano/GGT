<!-- Gourmet Getaway Tours — immersive concept (click a card to promote it to the hero) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gourmet Getaway — immersive concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --green:#7BC62D;
    --ink:#0C0E12;
    --paper:#F4F1EA;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--ink);color:#fff;overflow-x:hidden}
  .display{font-family:'Bebas Neue',sans-serif;font-weight:400}
  a{color:inherit;text-decoration:none}
  :focus-visible{outline:2px solid var(--green);outline-offset:3px}

  .stage{position:relative;height:100vh;min-height:660px;overflow:hidden}

  /* background photo layers (crossfade + slow zoom) */
  .bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.1s ease;background-color:#15211a;filter:saturate(1.35) contrast(1.07)}
  .bg.show{opacity:1;animation:kenburns 14s ease-out forwards}
  @keyframes kenburns{from{transform:scale(1.05)}to{transform:scale(1.16)}}
  .scrim{position:absolute;inset:0;background:
    radial-gradient(120% 90% at 78% 18%,rgba(123,198,45,.24),transparent 55%),
    linear-gradient(100deg,rgba(8,18,10,.93) 0%,rgba(8,18,10,.6) 34%,rgba(8,18,10,.12) 66%,rgba(8,18,10,.5) 100%),
    linear-gradient(to top,rgba(8,18,10,.7) 0%,transparent 42%)}

  /* header */
  header{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:26px 48px;animation:drop .8s ease both .1s}
  .logo{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.04em}
  .logo .dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--green)}
  nav.links{display:flex;gap:30px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.85)}
  nav.links a:hover{color:var(--green)}
  .head-icons{display:flex;gap:18px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.85)}
  @keyframes drop{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
  @media(max-width:820px){header{padding:20px 22px}nav.links,.head-icons{display:none}}

  /* main */
  main{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 40px}
  .copy{max-width:560px;margin-bottom:auto;margin-top:23vh}
  .eyebrow{display:flex;align-items:center;gap:12px;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:14px}
  .eyebrow::before{content:"";width:34px;height:1px;background:var(--green)}
  .copy h1{font-size:clamp(64px,11vw,150px);line-height:.84;letter-spacing:.01em}
  .copy p{margin:22px 0 26px;max-width:46ch;color:rgba(255,255,255,.82);font-size:15px;line-height:1.65}
  .cta{display:inline-flex;align-items:center;gap:14px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#fff}
  .cta .circle{width:46px;height:46px;border-radius:50%;background:var(--green);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .2s}
  .cta:hover .circle{transform:scale(1.1)}

  /* entrance / re-entrance of copy */
  .copy.animate .eyebrow{animation:rise .6s ease both}
  .copy.animate h1{animation:rise .7s ease both .08s}
  .copy.animate p{animation:rise .7s ease both .18s}
  .copy.animate .cta{animation:rise .7s ease both .28s}
  @keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}

  /* rail */
  .rail{display:flex;align-items:flex-end;justify-content:space-between;gap:30px}
  .cards{display:flex;gap:18px;overflow:hidden;padding:14px 0}
  .card{position:relative;flex:0 0 152px;height:212px;border-radius:var(--radius);overflow:hidden;cursor:pointer;background-size:cover;background-position:center;background-color:#15211a;box-shadow:0 18px 40px -18px rgba(0,0,0,.7);transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s,flex-basis .35s;animation:cardin .6s ease both}
  .card::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(8,18,10,.85),transparent 55%);transition:background .3s}
  .card:hover{transform:translateY(-8px) scale(1.03)}
  .card.is-active{flex-basis:176px;transform:translateY(-8px);box-shadow:0 22px 46px -16px rgba(0,0,0,.8)}
  .card.is-active::after{background:linear-gradient(to top,rgba(8,18,10,.85),rgba(123,198,45,.18) 70%,transparent)}
  .card .meta{position:absolute;left:14px;right:14px;bottom:14px;z-index:2}
  .card .meta .r{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--green);opacity:.95}
  .card .meta .n{font-family:'Bebas Neue';font-size:18px;line-height:1.05;letter-spacing:.02em;margin-top:3px}
  .card .ring{position:absolute;inset:0;border:2px solid var(--green);border-radius:var(--radius);opacity:0;transition:opacity .3s;z-index:3}
  .card.is-active .ring{opacity:1}
  @keyframes cardin{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

  /* controls column */
  .controls{display:flex;flex-direction:column;align-items:flex-end;gap:16px;flex:none}
  .arrows{display:flex;gap:10px}
  .arrows button{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.06);color:#fff;font-size:16px;cursor:pointer;transition:background .2s,transform .2s}
  .arrows button:hover{background:rgba(255,255,255,.16);transform:translateY(-2px)}
  .progress{width:150px;height:2px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
  .progress span{display:block;height:100%;background:var(--green);width:16%;transition:width .5s ease}
  .count{font-family:'Bebas Neue';font-size:60px;line-height:.9;letter-spacing:.02em}
  .count small{font-size:20px;color:rgba(255,255,255,.55)}
  .count #num{color:var(--green)}

  @media(max-width:820px){
    main{padding:0 22px 26px}
    .copy{margin-top:20vh}
    .rail{flex-direction:column;align-items:stretch;gap:16px}
    .cards{overflow-x:auto;padding-bottom:6px}
    .controls{flex-direction:row;align-items:center;justify-content:space-between}
    .count{font-size:42px}
  }

  @media(prefers-reduced-motion:reduce){
    .bg.show{animation:none}
    .copy.animate .eyebrow,.copy.animate h1,.copy.animate p,.copy.animate .cta,.card,header{animation:none}
    .bg{transition:opacity .25s}
  }
</style>

<div class="stage">
  <div class="bg" id="bgA"></div>
  <div class="bg" id="bgB"></div>
  <div class="scrim"></div>

  <header>
    <div class="logo"><span class="dot">G</span> Gourmet Getaway</div>
    <nav class="links">
      <a href="#">Home</a><a href="#">Tours</a><a href="#">Destinations</a><a href="#">About</a><a href="#">Contact</a>
    </nav>
    <div class="head-icons"><span>Search</span><span>Book</span></div>
  </header>

  <main>
    <div class="copy" id="copy">
      <div class="eyebrow" id="region"></div>
      <h1 class="display" id="title"></h1>
      <p id="blurb"></p>
      <a href="#" class="cta"><span class="circle">→</span> Explore this tour</a>
    </div>

    <div class="rail">
      <div class="cards" id="cards"></div>
      <div class="controls">
        <div class="arrows">
          <button id="prev" aria-label="Previous">‹</button>
          <button id="next" aria-label="Next">›</button>
        </div>
        <div class="progress"><span id="bar"></span></div>
        <div class="count"><span id="num">01</span><small id="total">/06</small></div>
      </div>
    </div>
  </main>
</div>

<script>
  // Placeholder photos (themed) — swap for Jimmy's real images later.
  const DEST = [
    { region:'New South Wales · Wine Country', name:'Hunter Valley',  blurb:'Cellar doors, long lunches and a chef who cooks a course to match every glass. Our flagship day out.', kw:'vineyard,winery', lock:11 },
    { region:'New South Wales · The Ranges',   name:'Blue Mountains', blurb:'Sandstone cliffs, eucalyptus haze and lookouts that go on forever — finished with a gourmet picnic.', kw:'mountains,valley', lock:22 },
    { region:'New South Wales · The Coast',    name:'Sydney Beaches', blurb:'Surf, sand and sea air along the coast, rounded off with a tasting paddle at a local brewery.', kw:'beach,surf', lock:33 },
    { region:'New South Wales · Underground',  name:'Jenolan Caves',  blurb:'Some of the oldest caves on earth by day, a campfire dinner under the stars by night.', kw:'cave,cavern', lock:44 },
    { region:'New South Wales · Pearl Coast',  name:'Central Coast',  blurb:'A pearl farm, a reptile park and a small-batch distillery — the Central Coast, off the beaten track.', kw:'coast,ocean', lock:55 },
    { region:'New South Wales · River & Vines',name:'Hawkesbury',     blurb:'Colonial history and riverside cellar doors along one of the prettiest stretches of the Hawkesbury.', kw:'river,vineyard', lock:66 }
  ];
  const hero = d => `https://loremflickr.com/1600/1000/${d.kw}?lock=${d.lock}`;
  const card = d => `https://loremflickr.com/500/700/${d.kw}?lock=${d.lock}`;

  const copy = document.getElementById('copy');
  const region = document.getElementById('region');
  const title = document.getElementById('title');
  const blurb = document.getElementById('blurb');
  const cardsEl = document.getElementById('cards');
  const bar = document.getElementById('bar');
  const num = document.getElementById('num');
  const bgA = document.getElementById('bgA');
  const bgB = document.getElementById('bgB');
  document.getElementById('total').textContent = '/' + String(DEST.length).padStart(2,'0');

  let active = 0;
  let frontA = true; // which bg layer is currently shown

  // build cards
  DEST.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.backgroundImage = `url('${card(d)}')`;
    el.style.animationDelay = (0.15 + i * 0.09) + 's';
    el.innerHTML = `<div class="ring"></div><div class="meta"><div class="r">${d.region.split('·').pop().trim()}</div><div class="n display">${d.name}</div></div>`;
    el.addEventListener('click', () => setActive(i));
    cardsEl.appendChild(el);
  });
  const cardEls = [...cardsEl.children];

  function setActive(i){
    active = (i + DEST.length) % DEST.length;
    const d = DEST[active];

    // crossfade background
    const incoming = frontA ? bgB : bgA;
    const outgoing = frontA ? bgA : bgB;
    incoming.style.backgroundImage = `url('${hero(d)}')`;
    incoming.classList.remove('show'); void incoming.offsetWidth;
    incoming.classList.add('show');
    outgoing.classList.remove('show');
    frontA = !frontA;

    // copy (replay stagger)
    region.textContent = d.region;
    title.textContent = d.name;
    blurb.textContent = d.blurb;
    copy.classList.remove('animate'); void copy.offsetWidth; copy.classList.add('animate');

    // number + progress + active card
    num.textContent = String(active + 1).padStart(2,'0');
    bar.style.width = ((active + 1) / DEST.length * 100) + '%';
    cardEls.forEach((c, j) => c.classList.toggle('is-active', j === active));
    cardEls[active].scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  }

  document.getElementById('next').addEventListener('click', () => setActive(active + 1));
  document.getElementById('prev').addEventListener('click', () => setActive(active - 1));
  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight') setActive(active + 1);
    if(e.key === 'ArrowLeft') setActive(active - 1);
  });

  setActive(0);
</script>
