# Netlify configuration for Gourmet Getaway Tours (Astro SSR).
# The @astrojs/netlify adapter turns `astro build` output into Netlify
# Functions for the server-rendered routes (including /api/*).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Pin Node to match local development.
  NODE_VERSION = "22"

[dev]
  # `netlify dev` proxies to the Astro dev server.
  command = "npm run dev"
  framework = "#custom"
  targetPort = 4321
  port = 8888

# Stripe webhooks must reach the raw function body. Astro/Netlify handle the
# /api/* routes via the adapter, so no manual redirects are required here.
# Add redirects below only if you introduce custom paths.
